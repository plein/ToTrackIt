openapi: 3.0.1
info:
  title: ToTrackIt API
  description: Open-source SaaS platform for tracking and monitoring asynchronous
    processes
  contact:
    name: ToTrackIt
    url: https://github.com/plein/ToTrackIt
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  version: "0.1"
servers:
- url: http://localhost:8080
  description: Local development server
tags:
- name: Health
  description: Health check and monitoring endpoints
- name: Processes
  description: Process tracking and management operations
- name: Analytics
  description: Aggregated statistics across processes
paths:
  /analytics/tags:
    get:
      tags:
      - Analytics
      summary: Tag impact breakdown
      description: "Aggregates deadline outcomes (overdue, late, on-time, failed)\
        \ per tag key/value, most problematic tags first. Use it to see which segment\
        \ (country, locale, provider, ...) a problem is concentrated in."
      operationId: tagImpact
      parameters:
      - name: name
        in: query
        description: Filter by process name
        schema:
          type: string
          nullable: true
      - name: window_hours
        in: query
        description: "Include processes finished within the last N hours (1-720, default\
          \ 24). Active processes are always included."
        required: true
        schema:
          maximum: 720
          minimum: 1
          type: integer
          format: int32
          default: 24
      responses:
        "200":
          description: Per-tag impact breakdown
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagImpactResponse'
  /health/live:
    get:
      tags:
      - Health
      summary: Liveness probe
      description: Returns liveness status indicating if the application is responsive
      operationId: live
      responses:
        "200":
          description: Application is alive and responsive
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                allOf: []
                anyOf: []
                oneOf: []
        "503":
          description: Application is not responsive
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                allOf: []
                anyOf: []
                oneOf: []
  /health/ready:
    get:
      tags:
      - Health
      summary: Readiness probe
      description: Returns readiness status including database connectivity and migration
        status
      operationId: ready
      responses:
        "200":
          description: Application is ready to serve requests
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                allOf: []
                anyOf: []
                oneOf: []
        "503":
          description: Application is not ready
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                allOf: []
                anyOf: []
                oneOf: []
  /health/status:
    get:
      tags:
      - Health
      summary: Basic health check
      description: Returns basic application health status with component details
      operationId: health
      responses:
        "200":
          description: Application is healthy
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                allOf: []
                anyOf: []
                oneOf: []
        "503":
          description: Application is unhealthy
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                allOf: []
                anyOf: []
                oneOf: []
  /openapi.yml:
    get:
      operationId: getOpenApiSpec
      responses:
        "200":
          description: getOpenApiSpec 200 response
          content:
            text/plain:
              schema:
                type: string
  /processes:
    get:
      tags:
      - Processes
      summary: List processes
      description: Retrieve a paginated list of processes with optional filtering
        and sorting
      operationId: listProcesses
      parameters:
      - name: name
        in: query
        description: Filter by process name
        schema:
          type: string
          nullable: true
      - name: id
        in: query
        description: Filter by process ID
        schema:
          type: string
          nullable: true
      - name: status
        in: query
        description: Filter by process status
        schema:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/ProcessStatus'
      - name: deadlineStatus
        in: query
        description: Filter by deadline status
        schema:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/DeadlineStatus'
      - name: deadlineBefore
        in: query
        description: Filter processes with deadline before this timestamp
        schema:
          type: integer
          format: int64
          nullable: true
      - name: deadlineAfter
        in: query
        description: Filter processes with deadline after this timestamp
        schema:
          type: integer
          format: int64
          nullable: true
      - name: runningDurationMin
        in: query
        description: Filter processes running longer than this duration (minutes)
        schema:
          type: integer
          format: int32
          nullable: true
      - name: sort_by
        in: query
        description: "Sort field and direction (e.g., 'started_at:desc')"
        schema:
          type: string
          nullable: true
      - name: limit
        in: query
        description: Maximum number of results (1-100)
        schema:
          maximum: 100
          minimum: 1
          type: integer
          format: int32
          nullable: true
      - name: offset
        in: query
        description: Number of results to skip
        schema:
          minimum: 0
          type: integer
          format: int32
          nullable: true
      - name: tags
        in: query
        description: "Filter by tags (format: 'key1:value1,key2:value2')"
        schema:
          type: string
          nullable: true
      responses:
        "200":
          description: Successfully retrieved processes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedResult_Object_'
        "400":
          description: Invalid query parameters
  /processes/{name}:
    post:
      tags:
      - Processes
      summary: Create a new process
      description: Create a new process with the specified name and configuration
      operationId: createProcess
      parameters:
      - name: name
        in: path
        description: "Process name (alphanumeric, underscores, and hyphens only)"
        required: true
        schema:
          maxLength: 100
          minLength: 1
          pattern: "^[a-zA-Z0-9_-]+$"
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewProcessRequest'
        required: true
      responses:
        "201":
          description: Process created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessResponse'
        "400":
          description: Invalid request data
        "409":
          description: Process with this name and ID already exists
  /processes/{name}/{id}:
    get:
      tags:
      - Processes
      summary: Get a specific process
      description: Retrieve details of a specific process by name and ID
      operationId: getProcess
      parameters:
      - name: name
        in: path
        description: Process name
        required: true
        schema:
          maxLength: 100
          minLength: 1
          pattern: "^[a-zA-Z0-9_-]+$"
          type: string
      - name: id
        in: path
        description: Process ID
        required: true
        schema:
          maxLength: 50
          minLength: 1
          type: string
      responses:
        "200":
          description: Process found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessResponse'
        "404":
          description: Process not found
    delete:
      tags:
      - Processes
      summary: Delete a process
      description: Permanently delete a process record by name and ID
      operationId: deleteProcess
      parameters:
      - name: name
        in: path
        description: Process name
        required: true
        schema:
          maxLength: 100
          minLength: 1
          pattern: "^[a-zA-Z0-9_-]+$"
          type: string
      - name: id
        in: path
        description: Process ID
        required: true
        schema:
          maxLength: 50
          minLength: 1
          type: string
      responses:
        "204":
          description: Process deleted successfully
        "404":
          description: Process not found
  /processes/{name}/{id}/complete:
    put:
      tags:
      - Processes
      summary: Complete a process
      description: Mark a process as completed with optional status specification
      operationId: completeProcess
      parameters:
      - name: name
        in: path
        description: Process name
        required: true
        schema:
          maxLength: 100
          minLength: 1
          pattern: "^[a-zA-Z0-9_-]+$"
          type: string
      - name: id
        in: path
        description: Process ID
        required: true
        schema:
          maxLength: 50
          minLength: 1
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteProcessRequest'
      responses:
        "200":
          description: Process completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessResponse'
        "404":
          description: Process not found
        "400":
          description: Invalid completion request
  /swagger-ui:
    get:
      operationId: getSwaggerUi
      responses:
        "200":
          description: getSwaggerUi 200 response
          content:
            application/json:
              schema:
                type: string
components:
  schemas:
    CompleteProcessRequest:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/ProcessStatus'
      description: Request DTO for completing a process.
    DeadlineStatus:
      type: string
      description: Enumeration representing the deadline status of a process.
      enum:
      - ON_TRACK
      - MISSED
      - COMPLETED_ON_TIME
      - COMPLETED_LATE
    DurationStats:
      type: object
      properties:
        count:
          type: integer
          format: int64
        avg_seconds:
          type: number
          format: double
        p50_seconds:
          type: number
          format: double
        p90_seconds:
          type: number
          format: double
        p99_seconds:
          type: number
          format: double
      description: Completion-duration statistics (seconds) over a set of finished
        runs. Percentiles use the nearest-rank method.
    NewProcessRequest:
      required:
      - id
      type: object
      properties:
        id:
          maxLength: 50
          minLength: 3
          type: string
        deadline:
          minimum: 0
          type: integer
          format: int64
        tags:
          type: array
          items:
            $ref: '#/components/schemas/ProcessTag'
        context:
          type: object
          additionalProperties: true
      description: Request DTO for creating a new process.
    PagedResult_Object_:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
        total:
          type: integer
          format: int64
        limit:
          type: integer
          format: int32
        offset:
          type: integer
          format: int32
        has_more:
          type: boolean
      description: Generic paged result wrapper for API responses.
    ProcessResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          $ref: '#/components/schemas/ProcessStatus'
        deadline_status:
          $ref: '#/components/schemas/DeadlineStatus'
        started_at:
          type: integer
          format: int64
        completed_at:
          type: integer
          format: int64
        deadline:
          type: integer
          format: int64
        tags:
          type: array
          items:
            $ref: '#/components/schemas/ProcessTag'
        context:
          type: object
          additionalProperties: true
        duration:
          type: integer
          format: int64
      description: Response DTO for process information.
    ProcessStatus:
      type: string
      description: Enumeration representing the status of a process.
      enum:
      - ACTIVE
      - COMPLETED
      - FAILED
    ProcessTag:
      required:
      - key
      - value
      type: object
      properties:
        key:
          maxLength: 50
          minLength: 1
          type: string
        value:
          maxLength: 100
          minLength: 1
          type: string
      description: Represents a tag associated with a process for categorization and
        filtering.
    TagImpactEntry:
      type: object
      properties:
        key:
          type: string
        value:
          type: string
        overdue:
          type: integer
          description: Active processes currently past their deadline.
          format: int64
        on_track:
          type: integer
          description: Active processes still within their deadline (or without one).
          format: int64
        completed_late:
          type: integer
          description: Processes completed after their deadline within the window.
          format: int64
        completed_on_time:
          type: integer
          description: Processes completed within their deadline within the window.
          format: int64
        failed:
          type: integer
          description: Processes that failed within the window.
          format: int64
        total:
          type: integer
          description: All processes carrying this tag seen in the window.
          format: int64
        problems:
          type: integer
          description: overdue + completed_late + failed; the sort key for impact.
          format: int64
        duration:
          description: Completion-duration stats for this tag's finished runs; null
            when none.
          allOf:
          - $ref: '#/components/schemas/DurationStats'
      description: "Aggregated deadline outcomes for a single tag key/value pair,\
        \ used to show which segments (country, locale, provider, ...) a problem is\
        \ concentrated in."
    TagImpactResponse:
      type: object
      properties:
        duration:
          description: Completion-duration stats across all finished runs in the window.
          allOf:
          - $ref: '#/components/schemas/DurationStats'
        window_hours:
          type: integer
          format: int32
        generated_at:
          type: integer
          format: int64
        total_processes:
          type: integer
          description: "All processes considered (active, or finished within the window)."
          format: int64
        problem_processes:
          type: integer
          description: "Processes currently overdue, completed late, or failed in\
            \ the window."
          format: int64
        tags:
          type: array
          items:
            $ref: '#/components/schemas/TagImpactEntry'
      description: "Response for the tag-impact analytics endpoint: which tag segments\
        \ the current problems (overdue, late, failed processes) are concentrated\
        \ in."
